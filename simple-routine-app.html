<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルルーティン管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            min-height: calc(100vh - 40px);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }

        .routine-list {
            margin-top: 20px;
        }

        .routine-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 6px solid #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .routine-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .routine-item:hover::before {
            opacity: 1;
        }

        .routine-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .routine-item.completed {
            opacity: 0.8;
            border-left-color: #28a745;
            background: linear-gradient(135deg, #f8fff9 0%, #ffffff 100%);
        }

        .routine-item.completed .routine-title {
            text-decoration: line-through;
            color: #6c757d;
        }

        .routine-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
            position: relative;
            z-index: 1;
        }

        .routine-description {
            color: #6c757d;
            margin-bottom: 15px;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .routine-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #6c757d;
            position: relative;
            z-index: 1;
        }

        .frequency-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .user-info {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 2px solid #e9ecef;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #6c757d;
            font-size: 14px;
            font-weight: 600;
        }

        .error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.1);
        }

        .success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.1);
        }

        .hidden {
            display: none;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .tab {
            flex: 1;
            padding: 14px 20px;
            text-align: center;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #6c757d;
        }

        .tab.active {
            background: white;
            color: #667eea;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tab:hover:not(.active) {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        /* フローティング追加ボタン */
        .floating-add-btn {
            position: fixed;
            bottom: 50%;
            right: 50%;
            transform: translate(50%, 50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            z-index: 9999;
            display: none;
        }

        .floating-add-btn:hover {
            transform: translate(50%, 50%) scale(1.15);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close {
            position: absolute;
            right: 25px;
            top: 25px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover {
            color: #333;
            background: #f8f9fa;
        }

        /* タブコンテンツのデフォルト表示 */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 曜日選択スタイル */
        .day-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .day-checkbox {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }

        .day-checkbox:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .day-checkbox input[type="checkbox"] {
            margin-right: 6px;
            width: auto;
            padding: 0;
        }

        .day-checkbox input[type="checkbox"]:checked + span {
            color: #667eea;
        }

        .day-checkbox.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        /* 毎年選択スタイル */
        .yearly-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* カスタム頻度スタイル */
        .custom-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .custom-selector .form-group:last-child {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 シンプルルーティン管理</h1>
            <p>毎日の習慣を簡単に管理</p>
        </div>

        <div class="content">
            <!-- 認証画面 -->
            <div id="authView" class="view active">
                <h2>ログイン / 新規登録</h2>
                <form id="authForm">
                    <div class="form-group">
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">パスワード</label>
                        <input type="password" id="password" required minlength="6">
                    </div>
                    <button type="submit" class="btn">ログイン / 登録</button>
                </form>
                <div id="authMessage"></div>
            </div>

            <!-- メイン画面 -->
            <div id="mainView" class="view">
                <!-- ユーザー情報 -->
                <div class="user-info">
                    <strong id="userEmail"></strong> でログイン中
                    <button onclick="logout()" class="btn btn-secondary" style="width: auto; margin-top: 10px;">ログアウト</button>
                </div>

                <!-- 統計情報 -->
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalRoutines">0</div>
                        <div class="stat-label">総ルーティン数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="completedToday">0</div>
                        <div class="stat-label">今日完了</div>
                    </div>
                </div>

                <!-- タブ -->
                <div class="tabs">
                    <div class="tab active" onclick="showTab('today')">今日</div>
                    <div class="tab" onclick="showTab('all')">すべて</div>
                </div>

                <!-- 今日のルーティン -->
                <div id="todayTab" class="tab-content active">
                    <h3>今日のルーティン</h3>
                    <div id="todayRoutines" class="routine-list"></div>
                </div>

                <!-- すべてのルーティン -->
                <div id="allTab" class="tab-content">
                    <h3>すべてのルーティン</h3>
                    <div id="allRoutines" class="routine-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- フローティング追加ボタン -->
    <button id="floatingAddBtn" class="floating-add-btn" onclick="openAddModal()">+</button>

    <!-- 追加モーダル -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h3>新しいルーティンを追加</h3>
            <form id="addRoutineForm">
                <div class="form-group">
                    <label for="routineTitle">タイトル</label>
                    <input type="text" id="routineTitle" required>
                </div>
                <div class="form-group">
                    <label for="routineDescription">説明（任意）</label>
                    <textarea id="routineDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="routineFrequency">頻度</label>
                    <select id="routineFrequency" required onchange="toggleFrequencyOptions()">
                        <option value="daily">毎日</option>
                        <option value="weekly">毎週</option>
                        <option value="monthly">毎月</option>
                        <option value="yearly">毎年</option>
                        <option value="custom">カスタム</option>
                    </select>
                </div>
                
                <!-- 毎週の曜日選択 -->
                <div id="weeklyOptions" class="form-group" style="display: none;">
                    <label>曜日を選択</label>
                    <div class="day-selector">
                        <label class="day-checkbox">
                            <input type="checkbox" value="0"> 日
                        </label>
                        <label class="day-checkbox">
                            <input type="checkbox" value="1"> 月
                        </label>
                        <label class="day-checkbox">
                            <input type="checkbox" value="2"> 火
                        </label>
                        <label class="day-checkbox">
                            <input type="checkbox" value="3"> 水
                        </label>
                        <label class="day-checkbox">
                            <input type="checkbox" value="4"> 木
                        </label>
                        <label class="day-checkbox">
                            <input type="checkbox" value="5"> 金
                        </label>
                        <label class="day-checkbox">
                            <input type="checkbox" value="6"> 土
                        </label>
                    </div>
                </div>
                
                <!-- 毎月の日にち選択 -->
                <div id="monthlyOptions" class="form-group" style="display: none;">
                    <label for="monthlyDay">日にちを選択</label>
                    <select id="monthlyDay" required>
                        <option value="">選択してください</option>
                        <option value="1">1日</option>
                        <option value="2">2日</option>
                        <option value="3">3日</option>
                        <option value="4">4日</option>
                        <option value="5">5日</option>
                        <option value="6">6日</option>
                        <option value="7">7日</option>
                        <option value="8">8日</option>
                        <option value="9">9日</option>
                        <option value="10">10日</option>
                        <option value="11">11日</option>
                        <option value="12">12日</option>
                        <option value="13">13日</option>
                        <option value="14">14日</option>
                        <option value="15">15日</option>
                        <option value="16">16日</option>
                        <option value="17">17日</option>
                        <option value="18">18日</option>
                        <option value="19">19日</option>
                        <option value="20">20日</option>
                        <option value="21">21日</option>
                        <option value="22">22日</option>
                        <option value="23">23日</option>
                        <option value="24">24日</option>
                        <option value="25">25日</option>
                        <option value="26">26日</option>
                        <option value="27">27日</option>
                        <option value="28">28日</option>
                        <option value="29">29日</option>
                        <option value="30">30日</option>
                        <option value="31">31日</option>
                    </select>
                </div>

                <!-- 毎年の月日選択 -->
                <div id="yearlyOptions" class="form-group" style="display: none;">
                    <div class="yearly-selector">
                        <div class="form-group">
                            <label for="yearlyMonth">月を選択</label>
                            <select id="yearlyMonth" required>
                                <option value="">選択してください</option>
                                <option value="1">1月</option>
                                <option value="2">2月</option>
                                <option value="3">3月</option>
                                <option value="4">4月</option>
                                <option value="5">5月</option>
                                <option value="6">6月</option>
                                <option value="7">7月</option>
                                <option value="8">8月</option>
                                <option value="9">9月</option>
                                <option value="10">10月</option>
                                <option value="11">11月</option>
                                <option value="12">12月</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="yearlyDay">日にちを選択</label>
                            <select id="yearlyDay" required>
                                <option value="">選択してください</option>
                                <option value="1">1日</option>
                                <option value="2">2日</option>
                                <option value="3">3日</option>
                                <option value="4">4日</option>
                                <option value="5">5日</option>
                                <option value="6">6日</option>
                                <option value="7">7日</option>
                                <option value="8">8日</option>
                                <option value="9">9日</option>
                                <option value="10">10日</option>
                                <option value="11">11日</option>
                                <option value="12">12日</option>
                                <option value="13">13日</option>
                                <option value="14">14日</option>
                                <option value="15">15日</option>
                                <option value="16">16日</option>
                                <option value="17">17日</option>
                                <option value="18">18日</option>
                                <option value="19">19日</option>
                                <option value="20">20日</option>
                                <option value="21">21日</option>
                                <option value="22">22日</option>
                                <option value="23">23日</option>
                                <option value="24">24日</option>
                                <option value="25">25日</option>
                                <option value="26">26日</option>
                                <option value="27">27日</option>
                                <option value="28">28日</option>
                                <option value="29">29日</option>
                                <option value="30">30日</option>
                                <option value="31">31日</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- カスタム頻度設定 -->
                <div id="customOptions" class="form-group" style="display: none;">
                    <div class="custom-selector">
                        <div class="form-group">
                            <label for="customNumber">数値</label>
                            <input type="number" id="customNumber" min="1" max="365" placeholder="例: 3" required>
                        </div>
                        <div class="form-group">
                            <label for="customInterval">間隔</label>
                            <select id="customInterval" required>
                                <option value="">選択してください</option>
                                <option value="days">日</option>
                                <option value="weeks">週</option>
                                <option value="months">月</option>
                                <option value="years">年</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="customStartDate">開始日</label>
                            <input type="date" id="customStartDate" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">追加</button>
            </form>
        </div>
    </div>

    <script>
        // グローバル変数
        let currentUser = null;
        let routines = [];
        let completions = [];

        // 初期化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            checkAuth();
            setupEventListeners();
        });

        // データの読み込み
        function loadData() {
            try {
                const savedUser = localStorage.getItem('currentUser');
                const savedRoutines = localStorage.getItem('routines');
                const savedCompletions = localStorage.getItem('completions');

                if (savedUser) currentUser = JSON.parse(savedUser);
                if (savedRoutines) routines = JSON.parse(savedRoutines);
                if (savedCompletions) completions = JSON.parse(savedCompletions);
            } catch (error) {
                console.error('データ読み込みエラー:', error);
            }
        }

        // データの保存
        function saveData() {
            try {
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                localStorage.setItem('routines', JSON.stringify(routines));
                localStorage.setItem('completions', JSON.stringify(completions));
            } catch (error) {
                console.error('データ保存エラー:', error);
            }
        }

        // 認証状態チェック
        function checkAuth() {
            if (currentUser) {
                showMainView();
            } else {
                showAuthView();
            }
        }

        // イベントリスナーの設定
        function setupEventListeners() {
            // 認証フォーム
            document.getElementById('authForm').addEventListener('submit', handleAuth);
            
            // ルーティン追加フォーム
            document.getElementById('addRoutineForm').addEventListener('submit', handleAddRoutine);
            
            // 曜日選択の設定
            setupDayCheckboxes();
        }

        // 認証処理
        function handleAuth(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('authMessage');

            if (!email || !password) {
                showMessage('メールアドレスとパスワードを入力してください', 'error');
                return;
            }

            // シンプルな認証（実際のアプリでは適切なハッシュ化が必要）
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            
            if (users[email]) {
                // ログイン
                if (users[email].password === password) {
                    currentUser = { email: email };
                    saveData();
                    showMainView();
                    showMessage('ログインしました', 'success');
                } else {
                    showMessage('パスワードが正しくありません', 'error');
                }
            } else {
                // 新規登録
                users[email] = { email: email, password: password };
                localStorage.setItem('users', JSON.stringify(users));
                currentUser = { email: email };
                saveData();
                showMainView();
                showMessage('アカウントを作成しました', 'success');
            }
        }

        // 頻度選択の切り替え
        function toggleFrequencyOptions() {
            const frequency = document.getElementById('routineFrequency').value;
            const weeklyOptions = document.getElementById('weeklyOptions');
            const monthlyOptions = document.getElementById('monthlyOptions');
            const yearlyOptions = document.getElementById('yearlyOptions');
            const customOptions = document.getElementById('customOptions');
            const monthlyDaySelect = document.getElementById('monthlyDay');
            const yearlyMonthSelect = document.getElementById('yearlyMonth');
            const yearlyDaySelect = document.getElementById('yearlyDay');
            const customIntervalSelect = document.getElementById('customInterval');
            const customNumberInput = document.getElementById('customNumber');
            const customStartDateInput = document.getElementById('customStartDate');
            
            // すべてのオプションを非表示
            weeklyOptions.style.display = 'none';
            monthlyOptions.style.display = 'none';
            yearlyOptions.style.display = 'none';
            customOptions.style.display = 'none';
            
            // 必須属性をリセット
            monthlyDaySelect.required = false;
            yearlyMonthSelect.required = false;
            yearlyDaySelect.required = false;
            customIntervalSelect.required = false;
            customNumberInput.required = false;
            customStartDateInput.required = false;
            
            // 選択された頻度に応じてオプションを表示
            if (frequency === 'weekly') {
                weeklyOptions.style.display = 'block';
            } else if (frequency === 'monthly') {
                monthlyOptions.style.display = 'block';
                monthlyDaySelect.required = true;
            } else if (frequency === 'yearly') {
                yearlyOptions.style.display = 'block';
                yearlyMonthSelect.required = true;
                yearlyDaySelect.required = true;
            } else if (frequency === 'custom') {
                customOptions.style.display = 'block';
                customIntervalSelect.required = true;
                customNumberInput.required = true;
                customStartDateInput.required = true;
            }
        }

        // 曜日選択の処理
        function setupDayCheckboxes() {
            const checkboxes = document.querySelectorAll('.day-checkbox input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const label = this.parentElement;
                    if (this.checked) {
                        label.classList.add('selected');
                    } else {
                        label.classList.remove('selected');
                    }
                });
            });
        }

        // ルーティン追加
        function handleAddRoutine(event) {
            event.preventDefault();
            
            const title = document.getElementById('routineTitle').value;
            const description = document.getElementById('routineDescription').value;
            const frequency = document.getElementById('routineFrequency').value;

            if (!title) {
                showMessage('タイトルを入力してください', 'error');
                return;
            }

            // 頻度別の詳細設定を取得
            let frequencyDetails = {};
            
            if (frequency === 'weekly') {
                const selectedDays = Array.from(document.querySelectorAll('.day-checkbox input[type="checkbox"]:checked'))
                    .map(cb => parseInt(cb.value));
                if (selectedDays.length === 0) {
                    showMessage('曜日を選択してください', 'error');
                    return;
                }
                frequencyDetails = { selectedDays: selectedDays };
            } else if (frequency === 'monthly') {
                const monthlyDay = document.getElementById('monthlyDay').value;
                if (!monthlyDay) {
                    showMessage('日にちを選択してください', 'error');
                    return;
                }
                frequencyDetails = { selectedDay: parseInt(monthlyDay) };
            } else if (frequency === 'yearly') {
                const yearlyMonth = document.getElementById('yearlyMonth').value;
                const yearlyDay = document.getElementById('yearlyDay').value;
                if (!yearlyMonth || !yearlyDay) {
                    showMessage('月と日にちを選択してください', 'error');
                    return;
                }
                frequencyDetails = { selectedMonth: parseInt(yearlyMonth), selectedDay: parseInt(yearlyDay) };
            } else if (frequency === 'custom') {
                const customInterval = document.getElementById('customInterval').value;
                const customNumber = document.getElementById('customNumber').value;
                const customStartDate = document.getElementById('customStartDate').value;
                if (!customInterval || !customNumber || !customStartDate) {
                    showMessage('すべてのオプションを入力してください', 'error');
                    return;
                }
                frequencyDetails = {
                    interval: customInterval,
                    number: parseInt(customNumber),
                    startDate: customStartDate
                };
            }

            const newRoutine = {
                id: Date.now().toString(),
                title: title,
                description: description,
                frequency: frequency,
                frequencyDetails: frequencyDetails,
                createdAt: new Date().toISOString(),
                userId: currentUser.email
            };

            routines.push(newRoutine);
            saveData();
            updateDisplay();
            
            // モーダルを閉じる
            closeAddModal();
            showMessage('ルーティンを追加しました', 'success');
        }

        // ルーティン完了切り替え
        function toggleRoutine(routineId) {
            const today = new Date().toDateString();
            const completionKey = `${routineId}_${today}`;
            
            const existingIndex = completions.findIndex(c => c.id === completionKey);
            
            if (existingIndex >= 0) {
                completions.splice(existingIndex, 1);
            } else {
                completions.push({
                    id: completionKey,
                    routineId: routineId,
                    completedAt: new Date().toISOString(),
                    userId: currentUser.email
                });
            }
            
            saveData();
            updateDisplay();
        }

        // ルーティン削除
        function deleteRoutine(routineId) {
            if (confirm('このルーティンを削除しますか？')) {
                routines = routines.filter(r => r.id !== routineId);
                completions = completions.filter(c => c.routineId !== routineId);
                saveData();
                updateDisplay();
                showMessage('ルーティンを削除しました', 'success');
            }
        }

        // 表示更新
        function updateDisplay() {
            if (!currentUser) return;

            // ユーザー情報
            document.getElementById('userEmail').textContent = currentUser.email;

            // 統計情報
            document.getElementById('totalRoutines').textContent = routines.length;
            
            const today = new Date().toDateString();
            const todayCompletions = completions.filter(c => {
                const completionDate = new Date(c.completedAt).toDateString();
                return completionDate === today;
            });
            document.getElementById('completedToday').textContent = todayCompletions.length;

            // ルーティン表示
            displayRoutines();
        }

        // ルーティン表示
        function displayRoutines() {
            const today = new Date().toDateString();
            const currentDayOfWeek = new Date().getDay();
            const currentDayOfMonth = new Date().getDate();
            const currentMonth = new Date().getMonth() + 1;
            const currentDate = new Date();
            
            // 今日のルーティン
            const todayRoutines = routines.filter(routine => {
                if (routine.frequency === 'daily') return true;
                
                if (routine.frequency === 'weekly') {
                    if (routine.frequencyDetails && routine.frequencyDetails.selectedDays) {
                        return routine.frequencyDetails.selectedDays.includes(currentDayOfWeek);
                    }
                    return false;
                }
                
                if (routine.frequency === 'monthly') {
                    if (routine.frequencyDetails && routine.frequencyDetails.selectedDay) {
                        return routine.frequencyDetails.selectedDay === currentDayOfMonth;
                    }
                    return false;
                }

                if (routine.frequency === 'yearly') {
                    if (routine.frequencyDetails && routine.frequencyDetails.selectedMonth && routine.frequencyDetails.selectedDay) {
                        return routine.frequencyDetails.selectedMonth === currentMonth && 
                               routine.frequencyDetails.selectedDay === currentDayOfMonth;
                    }
                    return false;
                }

                if (routine.frequency === 'custom') {
                    if (routine.frequencyDetails && routine.frequencyDetails.startDate && 
                        routine.frequencyDetails.interval && routine.frequencyDetails.number) {
                        return isCustomRoutineDue(routine.frequencyDetails, currentDate);
                    }
                    return false;
                }
                
                return false;
            });

            document.getElementById('todayRoutines').innerHTML = createRoutineHTML(todayRoutines, today);
            document.getElementById('allRoutines').innerHTML = createRoutineHTML(routines, today);
        }

        // カスタム頻度のルーティンが今日実行すべきかチェック
        function isCustomRoutineDue(frequencyDetails, currentDate) {
            const startDate = new Date(frequencyDetails.startDate);
            const interval = frequencyDetails.interval;
            const number = frequencyDetails.number;
            
            // 開始日より前の場合は実行しない
            if (currentDate < startDate) return false;
            
            let diffTime, diffDays;
            
            switch (interval) {
                case 'days':
                    diffTime = currentDate - startDate;
                    diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    return diffDays % number === 0;
                    
                case 'weeks':
                    diffTime = currentDate - startDate;
                    diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    return diffDays % (number * 7) === 0;
                    
                case 'months':
                    const yearDiff = currentDate.getFullYear() - startDate.getFullYear();
                    const monthDiff = currentDate.getMonth() - startDate.getMonth();
                    const totalMonths = yearDiff * 12 + monthDiff;
                    return totalMonths % number === 0 && currentDate.getDate() === startDate.getDate();
                    
                case 'years':
                    const yearDiff2 = currentDate.getFullYear() - startDate.getFullYear();
                    return yearDiff2 % number === 0 && 
                           currentDate.getMonth() === startDate.getMonth() && 
                           currentDate.getDate() === startDate.getDate();
                    
                default:
                    return false;
            }
        }

        // ルーティンHTML生成
        function createRoutineHTML(routineList, today) {
            if (routineList.length === 0) {
                return '<p style="text-align: center; color: #6c757d; padding: 20px;">ルーティンがありません</p>';
            }

            return routineList.map(routine => {
                const isCompleted = completions.some(c => {
                    const completionDate = new Date(c.completedAt).toDateString();
                    return c.routineId === routine.id && completionDate === today;
                });

                let frequencyText = '';
                if (routine.frequency === 'daily') {
                    frequencyText = '毎日';
                } else if (routine.frequency === 'weekly') {
                    if (routine.frequencyDetails && routine.frequencyDetails.selectedDays) {
                        const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
                        const selectedDayNames = routine.frequencyDetails.selectedDays.map(day => dayNames[day]);
                        frequencyText = `毎週 ${selectedDayNames.join('・')}`;
                    } else {
                        frequencyText = '毎週';
                    }
                } else if (routine.frequency === 'monthly') {
                    if (routine.frequencyDetails && routine.frequencyDetails.selectedDay) {
                        frequencyText = `毎月${routine.frequencyDetails.selectedDay}日`;
                    } else {
                        frequencyText = '毎月';
                    }
                } else if (routine.frequency === 'yearly') {
                    if (routine.frequencyDetails && routine.frequencyDetails.selectedMonth && routine.frequencyDetails.selectedDay) {
                        frequencyText = `毎年${routine.frequencyDetails.selectedMonth}月${routine.frequencyDetails.selectedDay}日`;
                    } else {
                        frequencyText = '毎年';
                    }
                } else if (routine.frequency === 'custom') {
                    if (routine.frequencyDetails && routine.frequencyDetails.interval && routine.frequencyDetails.number) {
                        const intervalText = {
                            'days': '日',
                            'weeks': '週',
                            'months': '月',
                            'years': '年'
                        }[routine.frequencyDetails.interval];
                        frequencyText = `${routine.frequencyDetails.number}${intervalText}おき`;
                    } else {
                        frequencyText = 'カスタム';
                    }
                }

                return `
                    <div class="routine-item ${isCompleted ? 'completed' : ''}">
                        <div class="routine-title">${routine.title}</div>
                        ${routine.description ? `<div class="routine-description">${routine.description}</div>` : ''}
                        <div class="routine-meta">
                            <span class="frequency-badge">${frequencyText}</span>
                            <div>
                                <button onclick="toggleRoutine('${routine.id}')" class="btn ${isCompleted ? 'btn-secondary' : 'btn-success'}" style="width: auto; margin-right: 10px;">
                                    ${isCompleted ? '完了取り消し' : '完了'}
                                </button>
                                <button onclick="deleteRoutine('${routine.id}')" class="btn btn-danger" style="width: auto;">削除</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // タブ切り替え
        function showTab(tabName) {
            // タブボタンの状態更新
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // タブコンテンツの表示切り替え
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // モーダル制御
        function openAddModal() {
            document.getElementById('addModal').style.display = 'block';
            document.getElementById('floatingAddBtn').style.display = 'none';
            document.getElementById('routineTitle').focus();
        }

        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('floatingAddBtn').style.display = 'block';
            document.getElementById('addRoutineForm').reset();
            
            // 頻度オプションをリセット
            document.getElementById('weeklyOptions').style.display = 'none';
            document.getElementById('monthlyOptions').style.display = 'none';
            document.getElementById('yearlyOptions').style.display = 'none';
            document.getElementById('customOptions').style.display = 'none';
            
            // 必須属性をリセット
            document.getElementById('monthlyDay').required = false;
            document.getElementById('yearlyMonth').required = false;
            document.getElementById('yearlyDay').required = false;
            document.getElementById('customInterval').required = false;
            document.getElementById('customNumber').required = false;
            document.getElementById('customStartDate').required = false;
            
            // チェックボックスの選択状態をリセット
            document.querySelectorAll('.day-checkbox').forEach(label => {
                label.classList.remove('selected');
            });
        }

        // モーダル外クリックで閉じる
        window.onclick = function(event) {
            const modal = document.getElementById('addModal');
            if (event.target === modal) {
                closeAddModal();
            }
        }

        // ログアウト
        function logout() {
            currentUser = null;
            saveData();
            showAuthView();
            showMessage('ログアウトしました', 'success');
        }

        // 画面切り替え
        function showMainView() {
            document.getElementById('authView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
            document.getElementById('floatingAddBtn').style.display = 'block';
            updateDisplay();
        }

        function showAuthView() {
            document.getElementById('mainView').classList.remove('active');
            document.getElementById('authView').classList.add('active');
            document.getElementById('floatingAddBtn').style.display = 'none';
        }

        // メッセージ表示
        function showMessage(message, type) {
            let messageDiv = document.getElementById('authMessage');
            if (!messageDiv) {
                // メイン画面用のメッセージ要素を作成
                messageDiv = document.createElement('div');
                messageDiv.id = 'mainMessage';
                messageDiv.style.position = 'fixed';
                messageDiv.style.top = '20px';
                messageDiv.style.left = '50%';
                messageDiv.style.transform = 'translateX(-50%)';
                messageDiv.style.zIndex = '3000';
                document.body.appendChild(messageDiv);
            }
            
            messageDiv.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }

        // 初期表示
        updateDisplay();
    </script>
